  <!-- ================= SINGLE LIGHTBOX POP-UP ================= -->
<div id="custom-lightbox" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); justify-content: center; align-items: center; z-index: 99999;">
  
  <!-- Click the black background area outside the image to close -->
  <div onclick="closePopup()" style="position: absolute; width: 100%; height: 100%; cursor: pointer;"></div>
  
  <div style="position: relative; max-width: 85%; max-height: 85%; display: flex; justify-content: center; align-items: center;">
    <!-- Close button (X) -->
    <button onclick="closePopup()" style="position: absolute; top: -45px; right: 0; background: none; border: none; color: white; font-size: 35px; cursor: pointer; padding: 0; line-height: 1;">&times;</button>
    
    <!-- Container where the large image is displayed -->
    <img id="popup-img" src="" alt="Large View" style="max-width: 100%; max-height: 85vh; object-fit: contain; border: 4px solid white; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 4px;">
  </div>

<!-- ================= AUTOMATIC JAVASCRIPT LOGIC ================= -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  // 1. Find all image links inside your slider track
  const track = document.getElementById("friends-track");
  if (!track) return;
  
  const links = track.querySelectorAll(".gallery-card a");

  // 2. Automatically apply the pop-up behavior when any link is clicked
  links.forEach(function (link) {
    link.addEventListener("click", function (event) {
      event.preventDefault(); // Prevent browser from opening the image in a new tab
      
      const imageUrl = this.getAttribute("href"); // Extract the image URL from href
      const popupImg = document.getElementById("popup-img");
      const lightbox = document.getElementById("custom-lightbox");
      
      popupImg.src = imageUrl; // Insert the URL into the pop-up image tag
      lightbox.style.display = "flex"; // Show the pop-up container
    });
  });
});

// 3. Function to close the pop-up
function closePopup() {
  document.getElementById("custom-lightbox").style.display = "none";
}
</script>


  <!-- ==== Native Slider Translation Script Module ==== -->
  <script>
    function scrollSlider(trackId, direction) {
      const track = document.getElementById(trackId);
      // Reads individual card size dynamically to compute perfect sliding distances
      const cardWidth = track.querySelector('.gallery-card').offsetWidth + 20;
      track.scrollBy({
        left: cardWidth * direction * 2, /* Slides track by 2 card increments per click trigger */
        behavior: 'smooth'
      });
    }
  </script>
